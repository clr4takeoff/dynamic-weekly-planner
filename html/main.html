<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Weekly Planner</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
  </head>

  <body>
    <div class="container">
      <!-- Today's Date -->
      <div class="today-date">
        <p>Today is YYYY / MM / DD</p>
      </div>

      <!-- Weekly Task Overview -->
      <div class="task-overview">
        <div class="task">Task</div>
        <div class="task">Task</div>
        <div class="task">Task</div>
        <div class="task">Task</div>
        <div class="task">Task</div>
        <div class="task">Task</div>
        <div class="task">Task</div>
      </div>

      <!-- Calendar Headers -->
      <div class="calendar-header">
        <div class="time-label"></div>
      </div>

      <!-- Calendar Body -->
      <div class="calendar-body">
        <div class="time-labels"></div>
        <!-- Left column for time labels -->
        <!-- Columns for each day will be generated by JavaScript -->
      </div>

      <!-- Mini Calendar -->
      <div class="mini-calendar">
        <p>Calendar</p>
        <input type="text" id="calendarPicker" placeholder="Select Date" />
      </div>

      <!-- Memo Section -->
      <div class="memo-section">
        <p>Memo</p>
        <textarea id="memoText" placeholder="메모를 작성하세요"></textarea>
        <button id="saveMemoButton">저장</button>
      </div>

      <!-- Sidebar with Floating Icons -->
      <div class="sidebar">
        <!-- main으로 이동 -->
        <a href="main.html" class="icon">🏠</a>
        <!-- stopwatch로 이동 -->
        <a href="stopwatch.html" class="icon">⏰</a>
        <!-- mypage로 이동 -->
        <a href="mypage.html" class="icon">⭐️</a>
        <!-- Settings로 이동 -->
        <a href="settings.html" class="icon">⚙️</a>
      </div>
    </div>

    <!-- Event Modal -->
    <div id="eventModal" class="modal" style="display: none">
      <div class="modal-content">
        <span class="close-button" style="cursor: pointer">&times;</span>
        <h2 style="margin-bottom: 20px; font-size: 1.5em">일정 정보</h2>

        <!-- Display Selected Date -->
        <div style="margin-bottom: 15px">
          <p
            id="selectedDate"
            style="font-weight: bold; font-size: 1.1em; margin: 0"
          >
            날짜: YYYY-MM-DD
          </p>
        </div>

        <!-- Display Start and End Times -->
        <div
          style="
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 15px;
          "
        >
          <p style="margin: 0">
            <strong>시작 시각:</strong> <span id="eventStartTime">--:--</span>
          </p>
          <p style="margin: 0">
            <strong>종료 시각:</strong> <span id="eventEndTime">--:--</span>
          </p>
        </div>

        <!-- Display Event Details if already exists -->
        <div
          id="existingEventDetails"
          style="margin-bottom: 15px; display: none"
        >
          <p
            id="existingEventTitle"
            style="font-weight: bold; font-size: 1.1em; margin: 0"
          >
            제목:
          </p>
          <p id="existingEventDetailsText" style="margin: 5px 0 0 0">
            세부 정보:
          </p>
        </div>

        <!-- Event Form -->
        <form id="eventForm">
          <!-- Event Title -->
          <div style="display: flex; align-items: center; margin-bottom: 10px">
            <label for="eventTitle" style="flex-basis: 80px; font-weight: bold"
              >제목:</label
            >
            <input
              type="text"
              id="eventTitle"
              name="title"
              required
              style="flex-grow: 1; padding: 5px"
            />
          </div>

          <!-- Event Details -->
          <div
            style="display: flex; align-items: flex-start; margin-bottom: 10px"
          >
            <label
              for="eventDetails"
              style="flex-basis: 80px; font-weight: bold"
              >세부 내용:</label
            >
            <textarea
              id="eventDetails"
              name="details"
              required
              style="flex-grow: 1; padding: 5px; resize: vertical"
              rows="3"
            ></textarea>
          </div>

          <!-- Color Picker -->
          <div style="display: flex; align-items: center; margin-bottom: 20px">
            <label for="eventColor" style="flex-basis: 80px; font-weight: bold"
              >색상 선택:</label
            >
            <input
              type="color"
              id="eventColor"
              name="color"
              value="#8F8F8F"
              style="width: 50px; height: 30px; border: none"
            />
          </div>

          <!-- 정기 일정과 임시 일정 구분을 위한 라디오 버튼 추가 -->
          <div style="margin-bottom: 20px">
            <label
              ><input
                type="radio"
                name="eventType"
                value="recurring"
                id="recurringEvent"
              />
              반복 일정</label
            >
            <label
              ><input
                type="radio"
                name="eventType"
                value="temporary"
                id="temporaryEvent"
              />
              임시 일정</label
            >
          </div>

          <!-- 주 반복 설정을 위한 주 선택 옵션 (정기일정 선택 시에만 보여짐) -->
          <div id="repeatWeeksSection" style="display: none">
            <label for="repeatWeeks">반복할 주 수(n주):</label>
            <input type="number" id="repeatWeeks" value="1" min="1" />
          </div>

          <!-- Buttons -->
          <div style="display: flex; gap: 10px; justify-content: flex-end">
            <button
              type="submit"
              style="padding: 8px 16px; font-size: 0.9em; cursor: pointer"
            >
              저장
            </button>
            <button
              type="button"
              id="deleteEventButton"
              style="padding: 8px 16px; font-size: 0.9em; cursor: pointer"
            >
              삭제
            </button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="../js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  </body>
</html>
